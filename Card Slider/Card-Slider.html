<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <title>Card Slider</title>
    <link rel="stylesheet" href="Card-Slider.css">
</head>

<body>
    <div class="container swiper">
        <div class="card-wrapper">
            <ul class="card-list swiper-wrapper">
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/1.png" alt="" class="card-image">
                        <h2 class="card-title">守宮小麵包樹擺設</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/2.png" alt="" class="card-image">
                        <h2 class="card-title">日本小石塊</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/2024-6月新品-13.jpg" alt="" class="card-image">
                        <h2 class="card-title">爬寵外出包</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/49.png" alt="" class="card-image">
                        <h2 class="card-title">守宮自動飲水器</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/5.png" alt="" class="card-image">
                        <h2 class="card-title">守宮蘇鐵樹擺設</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/商品圖文｜07｜8月新品(2)-09.jpg" alt="" class="card-image">
                        <h2 class="card-title">玻璃小水杯</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/爬蟲工地帽_工作區域 1.jpg" alt="" class="card-image">
                        <h2 class="card-title">守宮工地帽</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
                <li class="card-item swiper-slide">
                    <a href="#" class="card-link">
                        <img src="img/爬蟲特派員｜商品圖文-09 (1).jpg" alt="" class="card-image">
                        <h2 class="card-title">守宮飼養基本組</h2>
                        <button class="card-button">立即購買</button>
                    </a>
                </li>
            </ul>

            <div class="swiper-pagination"></div>
            <div class="swiper-slide-button swiper-button-prev"></div>
            <div class="swiper-slide-button swiper-button-next"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="Card-Slider.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽媽十塊｜質感選物</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- nav 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top py-3">
        <div class="container d-flex justify-content-between align-items-center">

            <a class="navbar-brand d-flex align-items-center fw-bold" href="#" style="letter-spacing: 1px;">
                <img src="/myshop/img/logo.png" alt="媽媽十塊logo" style="height: 50px; width: auto; margin-right: 12px;">

                <span class="brand-text">媽媽十塊雜貨店</span>
            </a>

            <div class="d-flex align-items-center">
                <a href="#cart-section" class="nav-link position-relative">
                    <i class="fa-solid fa-bag-shopping fs-4"></i>
                    <span id="cart-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark">0</span>
                </a>
            </div>

        </div>
    </nav>

    <!-- header banner -->
    <header class="text-center py-5 bg-light mb-5">
        <h1 class="display-6 fw-bold">Mom Mom Select</h1>
        <p class="text-muted">「 全館 NT$ 399 超商免運 • NT$ 999 宅配免運 」</p>
    </header>

    <!-- 商品卡片 -->
    <main class="container mb-5">
        <div id="product-list" class="row g-5">
        </div>
    </main>

    <!-- 購物車內容 -->
    <section id="cart-section" class="py-5 border-top">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <h4 class="text-center fw-bold mb-4">你的選物清單</h4>
                    <div id="cart-items" class="mb-4">
                        <p class="text-center text-muted">清單目前是空的</p>
                    </div>
                    <div class="d-flex justify-content-between align-items-center border-top pt-3">
                        <span class="h5">小計</span>
                        <span class="h5 fw-bold">NT$ <span id="cart-total">0</span></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="bg-light py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <form name="tenbucks-order" method="POST" data-netlify="true"
                        class="bg-white p-4 shadow-sm rounded">
                        <input type="hidden" name="cart_items" id="cart_summary">
                        <h4 class="mb-4 text-center">收件資料</h4>
                        <div class="mb-3">
                            <input type="text" name="name" class="form-control-custom" placeholder="收件人姓名" required>
                        </div>
                        <div class="mb-3">
                            <input type="tel" name="phone" class="form-control-custom" placeholder="手機號碼" required>
                        </div>
                        <div class="mb-3">
                            <select name="shipping" class="form-control-custom" required>
                                <option value="" disabled selected>選擇取貨方式</option>
                                <option value="CVS">7-11 / 全家 貨到付款</option>
                                <option value="POST">郵局宅配</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <textarea name="address" class="form-control-custom" rows="3" placeholder="請填寫超商門市名稱或收件地址"
                                required></textarea>
                        </div>
                        <button type="button" onclick="checkout(event)"
                            class="btn btn-dark w-100 py-3 fw-bold">確認下單</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- JS & bootstrap 引入 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="row g-0">
                        <div class="col-md-6">
                            <div id="modalCarousel" class="carousel slide" data-bs-ride="carousel">
                                <div class="carousel-inner" id="modal-images">
                                </div>
                                <button class="carousel-control-prev" type="button" data-bs-target="#modalCarousel"
                                    data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon"></span>
                                </button>
                                <button class="carousel-control-next" type="button" data-bs-target="#modalCarousel"
                                    data-bs-slide="next">
                                    <span class="carousel-control-next-icon"></span>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6 p-4 d-flex flex-column">
                            <div class="flex-grow-1 overflow-auto pe-2">
                                <h3 id="modal-title" class="fw-bold mb-2"></h3>
                                <h4 id="modal-price" class="fw-bold mb-3"></h4>

                                <hr style="border: 1px solid #d1d1d1;">

                                <div id="modal-color-wrapper" class="mb-3" style="display: none;">
                                    <label class="small text-muted d-block mb-2">選擇顏色</label>
                                    <div id="modal-color-btns" class="d-flex gap-2 flex-wrap"></div>
                                </div>
                                <div id="modal-size-wrapper" class="mb-3" style="display: none;">
                                    <label class="small text-muted d-block mb-2">選擇尺寸</label>
                                    <div id="modal-size-btns" class="d-flex gap-2 flex-wrap"></div>
                                </div>

                                <p id="modal-desc" class="text-muted small"></p>
                            </div>

                            <div class="pt-3 mt-auto">
                                <button id="modal-add-btn" class="btn btn-dark w-100 py-3 fw-bold">加入購物車</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

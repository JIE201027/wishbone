<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/999d878572.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="chckout.css" />
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="col-md-4 商品">
            <div>
                <h4 class="價格">150$</h4>
                <a class="商品名">沙拉</a>
                <a class="份量">1 份</a>
                <img
                    src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <hr />
            </div>
            <div>
                <h4 class="價格">300$</h4>
                <a class="商品名">披薩</a>
                <a class="份量">1 份</a>
                <img
                    src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=781&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <hr />
            </div>
            <div>
                <h4 class="價格">180$</h4>
                <a class="商品名">漢堡</a>
                <a class="份量">1 份</a>
                <img
                    src="https://plus.unsplash.com/premium_photo-1675252369719-dd52bc69c3df?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <hr />
            </div>
            <div>
                <h4 class="價格">120$</h4>
                <a class="商品名">鬆餅</a>
                <a class="份量">1 份</a>
                <img
                    src="https://images.unsplash.com/photo-1484723091739-30a097e8f929?q=80&w=749&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
            </div>
        </div>
        <div class="line"></div>
        <div class="col-md-4 結帳">
            <ul class="nav-list">
                <li><a class="進度欄"></i>購物車</a></li>
                <li><a class="進度欄"><i class="fa-solid fa-arrow-right-long"></i>結帳</a></li>
                <li><a class="進度欄"><i class="fa-solid fa-arrow-right-long"></i>完成</a></li>
            </ul>
            <form action="">
                <div class="form-group">
                    <label for="">姓名</label>
                    <input type="text" class="form-input" placeholder="請輸入您的姓名" required>
                </div>
                <div class="form-group">
                    <label for="">電子郵件</label>
                    <input type="text" class="form-input" placeholder="請輸入您的電子郵件" required>
                </div>
                <div class="form-group">
                    <label for="">取件地址</label>
                    <input type="text" class="form-input" placeholder="請輸入您的取件地址" required>
                </div>
            </form>
            <div class="container-2 pay-list">
                <div class="付款選項"><button><img src="/reptile/img/Mastercard-Emblem-PNG-VECTOR.png" /></button>
                </div>
                <div class="付款選項"><button><img src="/reptile/img/visa-logo-11530966316amvzjrobsf.png"></button>
                </div>
                <div class="付款選項"><button><img src="/reptile/img/街口支付logo.png"></button>
                </div>
                <div class="付款選項"><button><img src="/reptile/img/Apple-Pay-logo.png"></button>
                </div>
            </div>
            <button class="按鈕">立即付款</button>
        </div>
    </div>
</body>

</html>

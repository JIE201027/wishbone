backend:
  name: git-gateway
  branch: main

media_folder: "red/img"
public_folder: "/img"

collections:
  - name: "content"
    label: "網頁文字管理"
    files:
      - file: "red/data.json"
        label: "首頁內容"
        name: "home"
        fields:
          - { label: "大標題", name: "mainTitle", widget: "string" }
          - { label: "副標題", name: "subTitle", widget: "string" }
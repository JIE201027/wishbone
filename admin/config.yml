backend:
  name: github
  repo: JIE201027/wishbone
  branch: main
  auth_type: pkce # 核心：免伺服器模式
  client_id: Ov23liM0kZxs0KsF2a5C
  base_url: https://api.github.com

display_url: https://wishbone-zeta.vercel.app
media_folder: "img"
public_folder: "/img"

collections:
  # --- 1. 紅紅的資料連動 ---
  - name: "red_page"
    label: "紅紅醫療紀錄管理"
    files:
      - name: "red_config"
        label: "紅紅首頁與醫療紀錄"
        file: "red/data.json" 
        fields:
          - { label: "主標題", name: "mainTitle", widget: "string" }
          - { label: "副標題", name: "subTitle", widget: "string" }
          - label: "醫療費用紀錄"
            name: "medicalRecords"
            widget: "list"
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "項目", name: "item", widget: "string" }
              - { label: "金額", name: "cost", widget: "string" }

  # --- 2. 許願骨的資料連動 ---
  - name: "wishbone_page"
    label: "許願骨官網管理"
    files:
      - name: "home_config"
        label: "許願骨首頁與價格"
        file: "wish/single-data.json"
        fields:
          - { label: "Banner 大標題", name: "heroTitle", widget: "string" }
          - { label: "Banner 副標題", name: "heroDesc", widget: "string" }
          - label: "價格方案列表"
            name: "pricing"
            widget: "list"
            fields:
              - { label: "標籤", name: "tag", widget: "string" }
              - { label: "方案名稱", name: "title", widget: "string" }
              - { label: "價格數字", name: "price", widget: "string" }
              - { label: "維護費備註", name: "maintenance", widget: "string" }
              - { label: "適合對象描述", name: "target", widget: "string" }
              - { label: "方案詳細介紹", name: "desc", widget: "text" }
              - { label: "功能勾選清單", name: "features", widget: "list" }

 # --- 3. 媽媽十塊的資料連動 (修正為單一檔案模式) ---
  - name: "myshop_page"
    label: "🛒 媽媽十塊 - 全商品管理"
    files:
      - name: "products_config"
        label: "商品列表總管"
        file: "myshop/products.json" # 所有商品存在這一個檔案
        allow_add: true # 允許在 list 中新增項目
        fields:
          - label: "所有商品清單"
            name: "all_products"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "商品 ID (例如 m01)", name: "id", widget: "string" }
              - { label: "商品名稱", name: "name", widget: "string" }
              - { 
                  label: "分類", 
                  name: "category", 
                  widget: "select", 
                  options: [
                    { label: "熱賣商品", value: "bestseller" },
                    { label: "居家選物", value: "living" },
                    { label: "療癒小物", value: "accessory" }
                  ] 
                }
              - { label: "價格", name: "price", widget: "number" }
              - { label: "短描述 (列表顯示)", name: "desc", widget: "string" }
              - { label: "詳細規格 (彈窗顯示)", name: "modalDesc", widget: "text" }
              - { label: "商品特點", name: "features", widget: "list", field: {label: "特點", name: "item", widget: "string"} }
              - { label: "商品圖片輪播", name: "images", widget: "list", field: {label: "圖片", name: "img", widget: "image"} }
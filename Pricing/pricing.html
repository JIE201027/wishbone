<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>
    <link rel="stylesheet" href="pricing.css">
</head>

<body>
    <div id="價格表" class="container">
        <div class="格子">
            <img src="img/1.png" alt="個人方案">
            <h2 class="方案">個人方案</h2>
            <h4>199$ / 月</h4>
            <p class="一般文字">最多 1 人使用</p>
            <button class="btn btn-outline">立即體驗</button>
            <div class="line"></div>
        </div>
        <div class="格子">
            <img src="img/2.png" alt="雙人方案">
            <h2 class="方案">雙人方案</h2>
            <h4>299$ / 月</h4>
            <p class="一般文字">最多 2 人使用</p>
            <button class="btn btn-outline">立即體驗</button>
            <div class="line"></div>
        </div>
        <div class="格子">
            <img src="img/3.png" alt="家庭方案">
            <h2 class="方案">家庭方案</h2>
            <h4>399$ / 月</h4>
            <p class="一般文字">最多 5 人使用</p>
            <button class="btn btn-outline">立即體驗</button>
        </div>
    </div>
    </div>
    </div>
</body>

</html>
